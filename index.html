<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday! 🎁</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* PASTA SAHNESİ */
        #sahne {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('yanik.jpeg'); /* Uzantı .jpeg yapıldı */
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: flex-end;
            transition: opacity 1s ease;
        }

        .btn { padding: 20px 40px; margin-bottom: 50px; cursor: pointer; background: #f59e0b; color: white; border: none; border-radius: 50px; font-size: 20px; }

        /* HEDİYE SAHNESİ */
        #hediye-alani {
            display: none; width: 100vw; height: 100vh; background: #fff7ed;
            flex-direction: column; justify-content: center; align-items: center;
        }
        
        /* Hediye kutusu için artık hediyeler.jpeg dosyanı kullanıyoruz */
        .kutu { 
            width: 200px; height: 200px; 
            background-image: url('hediyeler.jpeg'); 
            background-size: contain; background-repeat: no-repeat;
            cursor: pointer; 
        }

        #mektup { display: none; padding: 40px; text-align: center; color: #451a03; max-width: 600px; }
    </style>
</head>
<body>

    <div id="sahne">
        <button class="btn" onclick="mumuSondur()">Mumu Üfle!</button>
    </div>

    <div id="hediye-alani">
        <div class="kutu" onclick="hediyeyiAc()"></div>
        <p>Açmak için kutuya tıkla!</p>
        <div id="mektup">
            <h1>Happy Birthday! 🎂✨</h1>
            <p>On this very special day, I want to thank you for your endless support, kindness, and dedication. May all your dreams come true.</p>
        </div>
    </div>

    <script>
        function mumuSondur() {
            // Sönük resim için .jpeg uzantısını kullan
            document.getElementById('sahne').style.backgroundImage = "url('sonuk.jpeg')";
            
            setTimeout(() => {
                document.getElementById('sahne').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('sahne').style.display = 'none';
                    document.getElementById('hediye-alani').style.display = 'flex';
                }, 1000);
            }, 1000);
        }

        function hediyeyiAc() {
            document.querySelector('.kutu').style.display = 'none';
            document.querySelector('p').style.display = 'none';
            document.getElementById('mektup').style.display = 'block';
        }
    </script>
</body>
</html>
